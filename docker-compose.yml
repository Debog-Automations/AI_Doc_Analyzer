version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: doc_analyzer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docanalyzer
      POSTGRES_PASSWORD: docanalyzer_secret
      POSTGRES_DB: document_registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docanalyzer -d document_registry"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local


